<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>
</head>

<body>

<h1>예약 관리</h1>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ⚠️ 주의: 여기도 실제 Firebase 설정값으로 변경해야 합니다.
const firebaseConfig = {
  apiKey: "여기에키",
  authDomain: "프로젝트.firebaseapp.com",
  databaseURL: "https://프로젝트-default-rtdb.firebaseio.com",
  projectId: "프로젝트"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

async function load() {
  list.innerHTML = "데이터를 불러오는 중..."; // 로딩 표시

  // 1. 전체 사물함 데이터를 한 번에 가져옵니다.
  const lockersRef = ref(db, "lockers");
  const snapshot = await get(lockersRef);

  list.innerHTML = ""; // 로딩 표시 지우기

  if (snapshot.exists()) {
    const lockersData = snapshot.val();
    let hasReservation = false;

    // 2. 1번부터 33번까지 확인하며 예약된 것만 목록에 띄웁니다.
    for (let i = 1; i <= 33; i++) {
      if (lockersData[i]) {
        hasReservation = true;
        
        let div = document.createElement("div");
        div.style.marginBottom = "10px"; // 보기 좋게 간격 추가
        div.innerHTML = `<strong>${i}번</strong> : ${lockersData[i].name} `;

        let btn = document.createElement("button");
        btn.innerText = "삭제";

        // 삭제 버튼 클릭 시 동작
        btn.onclick = async () => {
          let specificLockerRef = ref(db, "lockers/" + i);
          await remove(specificLockerRef);
          load(); // 삭제 후 목록 다시 새로고침
        };

        div.appendChild(btn);
        list.appendChild(div);
      }
    }

    if (!hasReservation) {
      list.innerHTML = "현재 예약된 사물함이 없습니다.";
    }

  } else {
    list.innerHTML = "현재 예약된 사물함이 없습니다.";
  }
}

load();
</script>

</body>
</html>
